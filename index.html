<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>スナップバスケ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body {
    height: 100%; overflow: hidden; background: #000; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
  }
  #game { display: block; width: 100vw; height: 100vh; touch-action: none; }
  #ui {
    position: fixed; top: env(safe-area-inset-top, 0); left: 0; right: 0; padding: 16px;
    display: flex; justify-content: space-between; pointer-events: none;
    font-size: 18px; font-weight: bold; text-shadow: 0 2px 6px rgba(0,0,0,0.7);
  }
  #status {
    position: fixed; bottom: 32px; left: 0; right: 0; text-align: center;
    font-size: 16px; opacity: 0.8; pointer-events: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    transition: opacity 0.2s;
  }
  #status.dim { opacity: 0.4; }
  #result {
    position: fixed; top: 36%; left: 0; right: 0; text-align: center;
    font-size: 72px; font-weight: 900; opacity: 0; transition: all 0.3s;
    transform: scale(0.4); pointer-events: none; letter-spacing: 2px;
  }
  #result.show { opacity: 1; transform: scale(1); }
  #result.in { color: #fde047; text-shadow: 0 0 30px rgba(253,224,71,0.9); }
  #result.miss { color: #cbd5e1; text-shadow: 0 0 20px rgba(0,0,0,0.6); }
  #shooting-indicator {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 22px; font-weight: bold; opacity: 0;
    color: #fb923c; text-shadow: 0 0 16px rgba(251,146,60,0.7);
    pointer-events: none; transition: opacity 0.2s;
  }
  #shooting-indicator.show { opacity: 1; }
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; padding: 24px; text-align: center; backdrop-filter: blur(8px);
  }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: 30px; }
  #overlay p { font-size: 15px; line-height: 1.7; opacity: 0.9; max-width: 320px; }
  #overlay .big { font-size: 64px; font-weight: 900; color: #fb923c; line-height: 1; }
  button {
    padding: 14px 32px; font-size: 17px; font-weight: bold;
    border: none; border-radius: 999px;
    background: linear-gradient(135deg, #fb923c, #ef4444);
    color: white; cursor: pointer;
    box-shadow: 0 6px 20px rgba(239,68,68,0.4);
  }
  button:active { transform: scale(0.96); }
  #goal-flash {
    position: fixed; inset: 0; pointer-events: none; opacity: 0;
    background: radial-gradient(circle, rgba(253,224,71,0.4), transparent 60%);
    transition: opacity 0.4s;
  }
  #goal-flash.show { opacity: 1; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div>🏀 <span id="score">0</span></div>
  <div>残り <span id="shots">10</span></div>
</div>
<div id="status">下から上に振り上げてスナップ！</div>
<div id="shooting-indicator">● ● ●</div>
<div id="goal-flash"></div>
<div id="result"></div>
<div id="overlay">
  <h1>🏀 スナップバスケ</h1>
  <p>
    スマホを握って、<b>下から上に振り上げる</b>。<br>
    上の方で<b>手首をスナップ</b>。<br>
    振り終わって画面を見ると、<br>
    今のモーションの結果でボールが飛ぶ。<br><br>
    全10投。
  </p>
  <p style="font-size:13px;opacity:0.6;">※デスクトップは画面タップで投げられます</p>
  <button id="startBtn">スタート</button>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const shotsEl = document.getElementById('shots');
  const statusEl = document.getElementById('status');
  const resultEl = document.getElementById('result');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const goalFlash = document.getElementById('goal-flash');
  const shootingIndicator = document.getElementById('shooting-indicator');

  let W, H;
  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  addEventListener('resize', resize); resize();

  // ===== Perspective projection =====
  // World: x = right, y = up, z = away from camera
  // Camera at origin, eye height 1.6m, looking +z (slight downward in projection)
  const cam = { f: 540, y: 1.55, pitch: 0.05 };
  function horizonY() { return H * (0.5 + cam.pitch); }

  function project(x, y, z) {
    const zz = Math.max(z, 0.3);
    const sx = W / 2 + (x * cam.f) / zz;
    const sy = horizonY() - ((y - cam.y) * cam.f) / zz;
    const scale = cam.f / zz;
    return { sx, sy, scale };
  }

  // ===== State =====
  const PHASE = { IDLE: 0, SHOOTING: 1, FLYING: 2, RESULT: 3, GAMEOVER: 4 };
  const state = {
    score: 0,
    shotsLeft: 10,
    phase: PHASE.IDLE,
    ball: null,
    hoop: { x: 0, y: 3.0, z: 6 },
    motion: { peak: 0, startedAt: 0, samples: 0 },
  };

  function newHoop() {
    state.hoop.x = (Math.random() * 2 - 1) * 1.4;
    state.hoop.z = 5.5 + Math.random() * 1.8;
    state.hoop.y = 3.0;
  }

  function resetBall(visible = true) {
    state.ball = {
      x: 0, y: 1.3, z: 0.9,
      vx: 0, vy: 0, vz: 0,
      r: 0.12,
      flying: false,
      passed: false,
      scored: false,
      visible,
      spin: 0,
    };
  }

  function setStatus(text, dim = false) {
    statusEl.textContent = text;
    statusEl.classList.toggle('dim', dim);
  }

  function showResult(scored) {
    resultEl.textContent = scored ? 'GOAL!' : 'MISS';
    resultEl.className = scored ? 'show in' : 'show miss';
    setTimeout(() => resultEl.classList.remove('show'), 1100);
  }

  function flashGoal() {
    goalFlash.classList.add('show');
    setTimeout(() => goalFlash.classList.remove('show'), 500);
  }

  // ===== Shot =====
  function fire(power) {
    const b = state.ball;
    const h = state.hoop;
    if (!b) return;

    // Reset ball position to "shoot from hands"
    b.x = 0; b.y = 1.3; b.z = 0.9;
    b.passed = false; b.scored = false;
    b.visible = true;

    // Travel time ~1s baseline
    const baseT = 1.0;
    const idealVz = (h.z - b.z) / baseT;
    const idealVy = (h.y - b.y) / baseT + 0.5 * 9.8 * baseT;

    // power 0..1 -> velocity multiplier in [0.85 .. 1.15] for forgiving feel
    const mult = 0.85 + power * 0.30;
    const vz = idealVz * mult;
    const vy = idealVy * mult;

    // Aim noise: more power = more accuracy
    const accuracy = Math.min(1, 0.3 + power * 0.9);
    const noiseScale = 1 - accuracy;
    const tEst = (h.z - b.z) / vz;
    const targetX = h.x + (Math.random() * 2 - 1) * 0.45 * noiseScale;
    const targetYBoost = (Math.random() * 2 - 1) * 0.3 * noiseScale;

    b.vx = (targetX - b.x) / tEst;
    b.vy = vy + targetYBoost;
    b.vz = vz;
    b.flying = true;
    b.spin = 0;

    state.phase = PHASE.FLYING;
    setStatus('', true);
    shootingIndicator.classList.remove('show');
  }

  function updateBall(dt) {
    const b = state.ball;
    if (!b.flying) return;
    b.vy -= 9.8 * dt;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.z += b.vz * dt;
    b.spin += dt * 6;

    const h = state.hoop;
    if (!b.passed && b.z >= h.z) {
      b.passed = true;
      const dx = Math.abs(b.x - h.x);
      const dy = Math.abs(b.y - h.y);
      // hoop opening ~0.225m radius; descent helps
      if (dx < 0.22 && dy < 0.18 && b.vy < 0) {
        b.scored = true;
        state.score++;
        scoreEl.textContent = state.score;
      }
      finishShot();
    }
    if (b.y < -0.5 || b.z > h.z + 4 || Math.abs(b.x) > 6) {
      if (!b.passed) finishShot();
    }
  }

  function finishShot() {
    if (state.phase === PHASE.RESULT) return;
    state.phase = PHASE.RESULT;
    showResult(state.ball.scored);
    if (state.ball.scored) flashGoal();
    state.shotsLeft--;
    shotsEl.textContent = state.shotsLeft;

    setTimeout(() => {
      if (state.shotsLeft <= 0) endGame();
      else nextShot();
    }, 1300);
  }

  function nextShot() {
    resetBall(true);
    newHoop();
    state.motion.peak = 0;
    state.motion.samples = 0;
    state.motion.startedAt = 0;
    state.phase = PHASE.IDLE;
    setStatus('下から上に振り上げてスナップ！');
  }

  // ===== Drawing =====
  function drawCourt() {
    // Sky/wall
    const sky = ctx.createLinearGradient(0, 0, 0, horizonY());
    sky.addColorStop(0, '#0c1e3d');
    sky.addColorStop(1, '#3a4f7a');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, horizonY());

    // Floor
    const floor = ctx.createLinearGradient(0, horizonY(), 0, H);
    floor.addColorStop(0, '#7a4517');
    floor.addColorStop(1, '#2a1608');
    ctx.fillStyle = floor;
    ctx.fillRect(0, horizonY(), W, H - horizonY());

    // Floor perspective lines
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    for (let i = -3; i <= 3; i++) {
      const a = project(i * 0.9, 0, 0.5);
      const b = project(i * 0.9, 0, 14);
      ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
    }
    for (let z = 1; z <= 10; z++) {
      const a = project(-5, 0, z);
      const b = project(5, 0, z);
      ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
    }
  }

  function drawHoop() {
    const h = state.hoop;

    // pole
    const poleBot = project(h.x, 0, h.z + 0.35);
    const poleTop = project(h.x, h.y - 0.05, h.z + 0.35);
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = Math.max(2, poleTop.scale * 0.04);
    ctx.beginPath();
    ctx.moveTo(poleBot.sx, poleBot.sy);
    ctx.lineTo(poleTop.sx, poleTop.sy);
    ctx.stroke();

    // backboard
    const bbW = 1.0, bbH = 0.7;
    const c1 = project(h.x - bbW/2, h.y + bbH - 0.1, h.z + 0.18);
    const c2 = project(h.x + bbW/2, h.y + bbH - 0.1, h.z + 0.18);
    const c3 = project(h.x + bbW/2, h.y - 0.1, h.z + 0.18);
    const c4 = project(h.x - bbW/2, h.y - 0.1, h.z + 0.18);
    ctx.fillStyle = 'rgba(248,250,252,0.95)';
    ctx.beginPath();
    ctx.moveTo(c1.sx, c1.sy); ctx.lineTo(c2.sx, c2.sy);
    ctx.lineTo(c3.sx, c3.sy); ctx.lineTo(c4.sx, c4.sy);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1; ctx.stroke();

    // backboard inner square
    const sqW = 0.4, sqH = 0.32;
    const s1 = project(h.x - sqW/2, h.y + sqH, h.z + 0.17);
    const s2 = project(h.x + sqW/2, h.y + sqH, h.z + 0.17);
    const s3 = project(h.x + sqW/2, h.y, h.z + 0.17);
    const s4 = project(h.x - sqW/2, h.y, h.z + 0.17);
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = Math.max(1.5, s1.scale * 0.008);
    ctx.beginPath();
    ctx.moveTo(s1.sx, s1.sy); ctx.lineTo(s2.sx, s2.sy);
    ctx.lineTo(s3.sx, s3.sy); ctx.lineTo(s4.sx, s4.sy);
    ctx.closePath(); ctx.stroke();

    // rim (ellipse)
    const rL = project(h.x - 0.225, h.y, h.z);
    const rR = project(h.x + 0.225, h.y, h.z);
    const rF = project(h.x, h.y, h.z - 0.225);
    const rB = project(h.x, h.y, h.z + 0.225);
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = Math.max(3, rL.scale * 0.014);
    ctx.beginPath();
    ctx.ellipse(
      (rL.sx + rR.sx) / 2, (rF.sy + rB.sy) / 2,
      Math.abs(rR.sx - rL.sx) / 2, Math.max(2, Math.abs(rB.sy - rF.sy) / 2),
      0, 0, Math.PI * 2
    );
    ctx.stroke();

    // net
    ctx.strokeStyle = 'rgba(255,255,255,0.65)';
    ctx.lineWidth = 1;
    const segs = 10;
    for (let i = 0; i < segs; i++) {
      const ang = (i / segs) * Math.PI * 2;
      const t = project(h.x + Math.cos(ang) * 0.225, h.y, h.z + Math.sin(ang) * 0.225);
      const bo = project(h.x + Math.cos(ang) * 0.13, h.y - 0.32, h.z + Math.sin(ang) * 0.13);
      ctx.beginPath();
      ctx.moveTo(t.sx, t.sy); ctx.lineTo(bo.sx, bo.sy);
      ctx.stroke();
    }
  }

  function drawBall() {
    const b = state.ball;
    if (!b || !b.visible) return;

    // shadow
    const sh = project(b.x, 0, b.z);
    const shR = Math.max(2, (b.r * cam.f / Math.max(b.z, 0.4)) * 0.7);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(sh.sx, sh.sy, shR, shR * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();

    const p = project(b.x, b.y, b.z);
    const r = Math.max(3, b.r * p.scale);

    ctx.save();
    ctx.translate(p.sx, p.sy);
    ctx.rotate(b.spin);

    const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
    grad.addColorStop(0, '#ffb27a');
    grad.addColorStop(1, '#c2410c');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#5a2a0c';
    ctx.lineWidth = Math.max(1, r * 0.07);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.moveTo(-r, 0); ctx.lineTo(r, 0);
    ctx.moveTo(0, -r); ctx.lineTo(0, r);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(-r * 0.4, 0, r * 0.92, -Math.PI/2, Math.PI/2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(r * 0.4, 0, r * 0.92, Math.PI/2, -Math.PI/2);
    ctx.stroke();

    ctx.restore();
  }

  // ===== Loop =====
  let lastT = 0;
  function loop(t) {
    if (state.phase === PHASE.GAMEOVER) return;
    const dt = lastT ? Math.min((t - lastT) / 1000, 1/30) : 1/60;
    lastT = t;

    if (state.phase === PHASE.FLYING) updateBall(dt);

    drawCourt();
    drawHoop();
    drawBall();

    requestAnimationFrame(loop);
  }

  function startGame() {
    state.score = 0;
    state.shotsLeft = 10;
    scoreEl.textContent = 0;
    shotsEl.textContent = 10;
    resetBall(true);
    newHoop();
    state.phase = PHASE.IDLE;
    setStatus('下から上に振り上げてスナップ！');
    overlay.classList.add('hidden');
    lastT = 0;
    requestAnimationFrame(loop);
  }

  function endGame() {
    state.phase = PHASE.GAMEOVER;
    overlay.classList.remove('hidden');
    const msg = state.score >= 8 ? '🔥 神！'
              : state.score >= 6 ? '🎉 すごい！'
              : state.score >= 3 ? '👍 ナイス'
              : '🏀 もう一回！';
    overlay.innerHTML = `
      <h1>結果</h1>
      <div class="big">${state.score} / 10</div>
      <p>${msg}</p>
      <button id="restartBtn">もう一度</button>
    `;
    document.getElementById('restartBtn').addEventListener('click', startGame);
  }

  // ===== Motion detection =====
  // IDLE: wait until magnitude exceeds threshold for several frames -> SHOOTING
  // SHOOTING: track peak. When magnitude stays low for 200ms -> fire(power) after small delay
  let belowSince = 0;
  let aboveSamples = 0;
  let firePending = false;

  function handleMotion(e) {
    if (state.phase !== PHASE.IDLE && state.phase !== PHASE.SHOOTING) return;
    const a = (e.acceleration && e.acceleration.x !== null) ? e.acceleration : e.accelerationIncludingGravity;
    if (!a) return;
    const ax = a.x || 0, ay = a.y || 0, az = a.z || 0;
    let mag = Math.sqrt(ax*ax + ay*ay + az*az);
    if (a === e.accelerationIncludingGravity) mag = Math.abs(mag - 9.8);

    const now = performance.now();

    if (state.phase === PHASE.IDLE) {
      if (mag > 5) {
        aboveSamples++;
        if (aboveSamples >= 3) {
          // motion started
          state.phase = PHASE.SHOOTING;
          state.motion.peak = mag;
          state.motion.startedAt = now;
          state.motion.samples = 1;
          belowSince = 0;
          aboveSamples = 0;
          setStatus('シュート中…', true);
          shootingIndicator.classList.add('show');
        }
      } else {
        aboveSamples = Math.max(0, aboveSamples - 1);
      }
      return;
    }

    // SHOOTING: track
    state.motion.samples++;
    if (mag > state.motion.peak) state.motion.peak = mag;

    // settle detection
    if (mag < 4) {
      if (!belowSince) belowSince = now;
      if (!firePending && now - belowSince > 220) {
        firePending = true;
        const peak = state.motion.peak;
        // peak typical: 8 (gentle) ~ 35 (strong). Map to 0..1
        const power = Math.max(0, Math.min(1, (peak - 8) / 22));
        // Brief delay so user can look back at screen
        setTimeout(() => {
          firePending = false;
          if (state.phase === PHASE.SHOOTING) fire(power);
        }, 350);
      }
    } else {
      belowSince = 0;
    }

    // safety: timeout long motions
    if (!firePending && now - state.motion.startedAt > 4000) {
      firePending = true;
      const peak = state.motion.peak;
      const power = Math.max(0, Math.min(1, (peak - 8) / 22));
      setTimeout(() => {
        firePending = false;
        if (state.phase === PHASE.SHOOTING) fire(power);
      }, 200);
    }
  }

  async function requestSensors() {
    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
      try {
        const r = await DeviceMotionEvent.requestPermission();
        if (r !== 'granted') return false;
      } catch { return false; }
    }
    addEventListener('devicemotion', handleMotion);
    return true;
  }

  startBtn.addEventListener('click', async () => {
    await requestSensors();
    startGame();
  });

  // Desktop fallback: tap simulates a snap motion
  canvas.addEventListener('pointerdown', () => {
    if (state.phase !== PHASE.IDLE) return;
    state.phase = PHASE.SHOOTING;
    setStatus('シュート中…', true);
    shootingIndicator.classList.add('show');
    setTimeout(() => {
      if (state.phase === PHASE.SHOOTING) fire(0.45 + Math.random() * 0.35);
    }, 500);
  });
})();
</script>
</body>
</html>
